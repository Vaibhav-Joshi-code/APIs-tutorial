version: "3.9"

services:

  server-a:
    image: python:3.13-slim
    container_name: server-a
    working_dir: /app
    volumes:
      - ./server-a:/app
    command: python -m http.server 8001
    networks:
      - nginx-demo-network

  server-b:
    image: python:3.13-slim
    container_name: server-b
    working_dir: /app
    volumes:
      - ./server-b:/app
    command: python -m http.server 8002
    networks:
      - nginx-demo-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - server-a
      - server-b
    networks:
      - nginx-demo-network

networks:
  nginx-demo-network:
    driver: bridge
